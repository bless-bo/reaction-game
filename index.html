<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇大作战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
            margin-bottom: 15px;
        }

        #game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
        }

        .info-item {
            color: white;
            font-size: 1.2rem;
        }

        .info-value {
            color: #4ade80;
            font-weight: bold;
            font-size: 1.5rem;
        }

        #game-container {
            position: relative;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
        }

        #game-canvas {
            display: block;
            border-radius: 5px;
            background: #0a0a0a;
        }

        #mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            font-size: 2rem;
            background: rgba(74, 222, 128, 0.2);
            border: 2px solid #4ade80;
            border-radius: 15px;
            color: #4ade80;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            background: rgba(74, 222, 128, 0.5);
            transform: scale(0.95);
        }

        .control-placeholder {
            width: 70px;
            height: 70px;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 100;
        }

        .hidden {
            display: none !important;
        }

        #overlay h2 {
            font-size: 2rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        #overlay .final-score {
            font-size: 3rem;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #overlay .best-score {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #4ade80, #22c55e);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(74, 222, 128, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(74, 222, 128, 0.6);
        }

        .instructions {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-top: 20px;
            text-align: center;
            line-height: 1.6;
        }

        .instructions kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            margin: 0 3px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            #mobile-controls {
                display: flex;
                flex-direction: column;
            }

            .instructions {
                display: none;
            }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇大作战</h1>

    <div id="game-info">
        <div class="info-item">得分: <span class="info-value" id="score">0</span></div>
        <div class="info-item">速度: <span class="info-value" id="level">1</span></div>
    </div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="overlay">
            <h2 id="overlay-title">🐍 贪吃蛇大作战</h2>
            <div class="final-score" id="final-score">0</div>
            <div class="best-score" id="best-score">最高分: 0</div>
            <button class="btn" id="start-btn">开始游戏</button>
            <p class="instructions">
                使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制方向
            </p>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="control-row">
            <div class="control-placeholder"></div>
            <button class="control-btn" data-dir="up">⬆️</button>
            <div class="control-placeholder"></div>
        </div>
        <div class="control-row">
            <button class="control-btn" data-dir="left">⬅️</button>
            <button class="control-btn" data-dir="down">⬇️</button>
            <button class="control-btn" data-dir="right">➡️</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const finalScoreDisplay = document.getElementById('final-score');
        const bestScoreDisplay = document.getElementById('best-score');
        const startBtn = document.getElementById('start-btn');
        const overlayTitle = document.getElementById('overlay-title');

        // 画布大小
        const gridSize = 20;
        const tileCount = 20;
        canvas.width = gridSize * tileCount;
        canvas.height = gridSize * tileCount;

        // 游戏状态
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let bestScore = localStorage.getItem('snakeBestScore') || 0;
        let gameLoop = null;
        let gameSpeed = 150;
        let gameActive = false;

        // 初始化
        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 150;
            spawnFood();
            updateDisplay();
        }

        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        function updateDisplay() {
            scoreDisplay.textContent = score;
            levelDisplay.textContent = Math.floor(score / 50) + 1;
            bestScoreDisplay.textContent = `最高分: ${bestScore}`;
        }

        function startGame() {
            init();
            overlay.classList.add('hidden');
            gameActive = true;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function gameStep() {
            direction = { ...nextDirection };

            // 移动蛇
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 撞自己检测
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃食物检测
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('snakeBestScore', bestScore);
                }
                updateDisplay();
                spawnFood();

                // 加速
                if (score % 50 === 0 && gameSpeed > 80) {
                    gameSpeed -= 10;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画网格（可选，淡化）
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 画食物
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 画蛇
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                const greenShade = Math.max(100, 255 - index * 8);

                if (isHead) {
                    // 蛇头
                    ctx.fillStyle = '#4ade80';
                    ctx.shadowColor = '#4ade80';
                    ctx.shadowBlur = 15;
                } else {
                    // 蛇身
                    ctx.fillStyle = `rgb(74, 222, 128, ${1 - index * 0.03})`;
                    ctx.shadowBlur = 0;
                }

                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    4
                );
                ctx.fill();
                ctx.shadowBlur = 0;

                // 画蛇眼睛
                if (isHead) {
                    ctx.fillStyle = '#0a0a0a';
                    const eyeSize = 4;
                    const eyeOffset = 5;

                    let eye1X = segment.x * gridSize + gridSize / 2 - eyeOffset;
                    let eye2X = segment.x * gridSize + gridSize / 2 + eyeOffset;
                    let eye1Y = segment.y * gridSize + gridSize / 2 - 2;
                    let eye2Y = segment.y * gridSize + gridSize / 2 - 2;

                    if (direction.x === 1) {
                        eye1Y = segment.y * gridSize + gridSize / 2 - eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize / 2 + eyeOffset;
                        eye1X = eye2X = segment.x * gridSize + gridSize - 4;
                    } else if (direction.x === -1) {
                        eye1Y = segment.y * gridSize + gridSize / 2 - eyeOffset;
                        eye2Y = segment.y * gridSize + gridSize / 2 + eyeOffset;
                        eye1X = eye2X = segment.x * gridSize + 4;
                    } else if (direction.y === -1) {
                        eye1X = segment.x * gridSize + gridSize / 2 - eyeOffset;
                        eye2X = segment.x * gridSize + gridSize / 2 + eyeOffset;
                        eye1Y = eye2Y = segment.y * gridSize + 4;
                    } else {
                        eye1X = segment.x * gridSize + gridSize / 2 - eyeOffset;
                        eye2X = segment.x * gridSize + gridSize / 2 + eyeOffset;
                        eye1Y = eye2Y = segment.y * gridSize + gridSize - 4;
                    }

                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function gameOver() {
            gameActive = false;
            clearInterval(gameLoop);
            overlayTitle.textContent = '💀 游戏结束';
            finalScoreDisplay.textContent = score;
            updateDisplay();
            overlay.classList.remove('hidden');
            startBtn.textContent = '再来一局';
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameActive) {
                if (e.key === 'Enter' || e.key === ' ') {
                    startGame();
                }
                return;
            }

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // 手机控制
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!gameActive) {
                    startGame();
                    return;
                }

                const dir = btn.dataset.dir;
                switch (dir) {
                    case 'up':
                        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                        break;
                    case 'down':
                        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                        break;
                    case 'left':
                        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                        break;
                    case 'right':
                        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                        break;
                }
            });
        });

        // 触摸滑动控制
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            if (!gameActive) {
                startGame();
                return;
            }

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                if (dx > 30 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < -30 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                // 垂直滑动
                if (dy > 30 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < -30 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
        }, { passive: true });

        startBtn.addEventListener('click', startGame);

        // 初始化显示
        updateDisplay();
        draw();
    </script>
</body>
</html>
